# W&B Sweep for WEAR four-stage training
# Tunes sparsity penalties and Gumbel temperature start.
name: wear-channel_pruning_and_tau
project: thesis-sweep
method: grid

metric:
  name: stage3_test_f1
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 10

parameters:
  sparsity_weight:
    values: [0.01, 0.1, 0.3, 0.6, 1.0, 2.0]

  tau_start:
    values: [1.0, 5.0, 10.0, 20.0]

  lr:
    values: [0.001]

  stage2_backbone_lr_factor:
    values: [0.1]

  tau_end:
    values: [1.0]

program: wear_main_loso_channel_pruning.py
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args_no_boolean_flags}
  - --preprocessing=fft
  - --single_subject_only=0
  - --batch_size=64
  - --dropout=0.4
  - --performance 
  - --stage1_model_path="/root/master-thesis/models/wear/stage1/fft/wear_best_model_subject{subject}_val.pth"
