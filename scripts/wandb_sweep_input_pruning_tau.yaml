# W&B Sweep for WEAR four-stage training
# Tunes sparsity penalties and Gumbel temperature start.
name: wear-input_pruning-subject0-with-tau
project: thesis-sweep
method: grid

metric:
  name: stage3_test_f1
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 10

parameters:
  sparsity_weight_bin:
    values: [0.01, 0.1, 0.2, 0.3, 0.5, 0.7]

  tau_start:
    values: [1.0, 5.0, 10.0, 15.0, 20.0]

  lr:
    values: [0.001]

  stage2_backbone_lr_factor:
    values: [0.1]

  tau_end:
    values: [1.0]

program: wear_main_loso_input_pruning.py
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --preprocessing=fft
  - --single_subject_only
  - --epochs_stage1=60
  - --epochs_stage2=60
  - --epochs_stage3=60
  - --batch_size=64
  - --dropout=0.4
  - ${args_no_boolean_flags}
